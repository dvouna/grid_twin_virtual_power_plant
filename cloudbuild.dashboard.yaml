# Cloud Build configuration for the VPP Dashboard image.
# Used by the CI/CD pipeline to build Dockerfile.dashboard (separate from the
# MCP server Dockerfile) before deploying to Cloud Run.
#
# Usage:
#   gcloud builds submit . \
#     --config=cloudbuild.dashboard.yaml \
#     --substitutions=_IMAGE=<image-url>
#
# Required substitution:
#   _IMAGE  – fully-qualified image URL, e.g.
#             us-central1-docker.pkg.dev/PROJECT/vpp/dashboard:SHA

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-f'
      - Dockerfile.dashboard
      - '-t'
      - '$_IMAGE'
      - '.'

images:
  - '$_IMAGE'

options:
  logging: CLOUD_LOGGING_ONLY
