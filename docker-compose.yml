services:
  # THE DATA STREAM (Redpanda)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda-grid
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://127.0.0.1:9092
      - --set redpanda.enable_admin_api=true
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    ports:
      - "9092:9092" # Matches our Python Producer/Consumer scripts
      - "9644:9644" # Admin API for the Console
    healthcheck:
      test: [ "CMD", "rpk", "cluster", "health" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # THE VISUALIZER (Redpanda Console)
  console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    environment:
      - KAFKA_BROKERS=redpanda:29092
      - REDPANDA_ADMINAPI_ENABLED=true
      - REDPANDA_ADMINAPI_URLS=http://redpanda:9644
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  # --- THE BRAIN STORAGE (InfluxDB) ---
  influxdb:
    image: influxdb:2
    container_name: influxdb-grid
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=atlavt25
      - DOCKER_INFLUXDB_INIT_PASSWORD=sm_ramp25
      - DOCKER_INFLUXDB_INIT_ORG=myorg
      - DOCKER_INFLUXDB_INIT_BUCKET=energy
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=smg!indb25
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8086/ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- THE COMMAND CENTER (Grafana) ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-grid
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=smg!rmgrf25
    depends_on:
      influxdb:
        condition: service_healthy

  # --- THE BATTERY GATEKEEPER (BAM Service) ---
  bam-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bam-service
    ports:
      - "8000:8000"
    command: ["python", "-m", "vpp.agents.battery_manager"]
    environment:
      - PYTHONUNBUFFERED=1
      # D1: API authentication secret — set to a strong random string in production
      - BAM_API_KEY=${BAM_API_KEY:-changeme-in-production}
      # C2: Physical battery parameters — override to tune without code changes
      - BAM_CAPACITY_KWH=100000.0     # 100 MWh Virtual Megapack
      - BAM_MAX_C_RATE=1.0            # 1C charge/discharge rate
      - BAM_WEAR_COST=0.015           # $0.015/kWh degradation cost
      # InfluxDB connection for state persistence (Phase A)
      - INFLUX_CLOUD_URL=${INFLUX_CLOUD_URL}
      - INFLUX_CLOUD_TOKEN=${INFLUX_CLOUD_TOKEN}
      - INFLUX_CLOUD_ORG=${INFLUX_CLOUD_ORG}
      - INFLUX_CLOUD_BUCKET=${INFLUX_CLOUD_BUCKET}

volumes:
  redpanda_data:
  influxdb_data:
  grafana_data:
