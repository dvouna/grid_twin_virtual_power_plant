name: Deploy to Cloud Run

on:
  push:
    branches: [ "main", "develop" ]

env:
  REGION: us-central1
  GCP_PROJECT_ID: igneous-study-486512-g4
  REDPANDA_VM_NAME: redpanda-connect-vm
  REDPANDA_VM_ZONE: us-central1-a
  WIF_PROVIDER_NAME: projects/207186852167/locations/global/workloadIdentityPools/vpp-provider/providers/github-provider
  GCP_SERVICE_ACCOUNT: vpp-mcp-sa@igneous-study-486512-g4.iam.gserviceaccount.com

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff Linter
        run: ruff check . --output-format=github

      - name: Run Bandit Security Scan  
        run: bandit -r src/vpp/mcp/ src/vpp/core/ src/vpp/ml/ src/vpp/agents/arbitrage_trader.py src/vpp/agents/grid_response_actor.py src/vpp/agents/battery_manager.py scripts/producer.py scripts/consumer_ml.py -ll

      - name: Run Pytest with Coverage
        env:
          PYTHONPATH: src
        run: pytest -m "not integration" -v --cov=src --cov-report=term-missing
      
      - name: Validate Docker Build
        run: |
          docker build -t vpp-mcp-server:test .

  deploy-staging:
    name: Deploy to Staging
    needs: test
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    environment: staging
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ env.WIF_PROVIDER_NAME }}'
          service_account: '${{ env.GCP_SERVICE_ACCOUNT }}'

      - name: Verify Model Presence
        run: |
          echo "Checking for model files..."
          ls -R models/
          if [ ! -f "models/xgb_vpp_grid.json" ]; then
            echo "❌ CRITICAL: Model file missing in build context!"
            exit 1
          fi
          echo "✓ Model file found."

      - name: Deploy to Cloud Run (Staging)
        id: deploy
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: vpp-mcp-server-stage
          region: ${{ env.REGION }}
          source: .
          timeout: '300s'
          flags: --memory=1Gi --cpu=1 --cpu-boost --concurrency=10 --max-instances=5 --timeout=60s --startup-probe=httpGet.path=/health,httpGet.port=8080,initialDelaySeconds=15,periodSeconds=10,failureThreshold=3 --liveness-probe=httpGet.path=/health,httpGet.port=8080,periodSeconds=30,failureThreshold=3 --no-allow-unauthenticated
          secrets: |-
            INFLUX_CLOUD_URL=INFLUX_CLOUD_URL:latest
            INFLUX_CLOUD_TOKEN=INFLUX_CLOUD_TOKEN:latest
            INFLUX_CLOUD_ORG=INFLUX_CLOUD_ORG:latest
            INFLUX_CLOUD_BUCKET=INFLUX_CLOUD_BUCKET_STAGING:latest
          env_vars: |-
            MCP_TRANSPORT=sse

      # Phase 3: Deploy BAM Service FIRST — actors depend on it being reachable
      - name: Deploy BAM Service (Staging)
        id: deploy-bam-stage
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: bam-service-stage
          region: ${{ env.REGION }}
          source: .
          timeout: '300s'
          flags: >-
            --command=python
            --args=-m,vpp.agents.battery_manager
            --memory=512Mi
            --cpu=1
            --min-instances=1
            --max-instances=3
            --port=8000
            --startup-probe=httpGet.path=/state,httpGet.port=8000,initialDelaySeconds=10,periodSeconds=5,failureThreshold=5
            --no-allow-unauthenticated
          secrets: |-
            BAM_API_KEY=BAM_API_KEY:latest
            INFLUX_CLOUD_URL=INFLUX_CLOUD_URL:latest
            INFLUX_CLOUD_TOKEN=INFLUX_CLOUD_TOKEN:latest
            INFLUX_CLOUD_ORG=INFLUX_CLOUD_ORG:latest
            INFLUX_CLOUD_BUCKET=INFLUX_CLOUD_BUCKET_STAGING:latest
          env_vars: |-
            BAM_CAPACITY_KWH=100000.0
            BAM_MAX_C_RATE=1.0
            BAM_WEAR_COST=0.015

      # Phase 5: Verify BAM is healthy before deploying actors that depend on it
      - name: BAM Service Health Check (Staging)
        run: |
          BAM_URL="${{ steps.deploy-bam-stage.outputs.url }}"
          echo "Verifying BAM /state at $BAM_URL ..."
          TOKEN=$(gcloud auth print-identity-token)
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              "$BAM_URL/state")
            if [ "$STATUS" = "200" ]; then
              echo "✅ BAM Service healthy (HTTP 200) after $i attempt(s)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "❌ BAM Service failed health check after 10 attempts"
          exit 1

      - name: Deploy Consumer ML Job (Staging)
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          job: consumer-ml-stage
          region: ${{ env.REGION }}
          source: .
          flags: --command=python --args=scripts/consumer_ml.py
          secrets: |-
            INFLUX_CLOUD_URL=INFLUX_CLOUD_URL:latest
            INFLUX_CLOUD_TOKEN=INFLUX_CLOUD_TOKEN:latest
            INFLUX_CLOUD_ORG=INFLUX_CLOUD_ORG:latest
            INFLUX_CLOUD_BUCKET=INFLUX_CLOUD_BUCKET_STAGING:latest
            KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest

      - name: Deploy Arbitrage Trader Job (Staging)
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          job: arbitrage-trader-stage
          region: ${{ env.REGION }}
          source: .
          flags: --command=python --args=-m,vpp.agents.arbitrage_trader
          secrets: |-
            INFLUX_CLOUD_URL=INFLUX_CLOUD_URL:latest
            INFLUX_CLOUD_TOKEN=INFLUX_CLOUD_TOKEN:latest
            INFLUX_CLOUD_ORG=INFLUX_CLOUD_ORG:latest
            INFLUX_CLOUD_BUCKET=INFLUX_CLOUD_BUCKET_STAGING:latest
            BAM_API_KEY=BAM_API_KEY:latest
          env_vars: |-
            BAM_API_URL=${{ steps.deploy-bam-stage.outputs.url }}

      - name: Deploy Grid Response Actor Job (Staging)
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          job: grid-response-stage
          region: ${{ env.REGION }}
          source: .
          flags: --command=python --args=-m,vpp.agents.grid_response_actor
          secrets: |-
            INFLUX_CLOUD_URL=INFLUX_CLOUD_URL:latest
            INFLUX_CLOUD_TOKEN=INFLUX_CLOUD_TOKEN:latest
            INFLUX_CLOUD_ORG=INFLUX_CLOUD_ORG:latest
            INFLUX_CLOUD_BUCKET=INFLUX_CLOUD_BUCKET_STAGING:latest
            BAM_API_KEY=BAM_API_KEY:latest
          env_vars: |-
            BAM_API_URL=${{ steps.deploy-bam-stage.outputs.url }}

      - name: Create Deployment Summary
        if: success()
        run: |
          echo "## Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ github.job }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Infrastructure Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Cloud Run Service Logs](https://console.cloud.google.com/run/detail/${{ env.REGION }}/vpp-mcp-server-stage/logs?project=${{ env.GCP_PROJECT_ID }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Redpanda Connect VM](https://console.cloud.google.com/compute/instancesDetail/zones/${{ env.REDPANDA_VM_ZONE }}/instances/${{ env.REDPANDA_VM_NAME }}?project=${{ env.GCP_PROJECT_ID }})" >> $GITHUB_STEP_SUMMARY

  deploy-production:
    name: Deploy to Production
    needs: [test, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ env.WIF_PROVIDER_NAME }}'
          service_account: '${{ env.GCP_SERVICE_ACCOUNT }}'

      - name: Verify Model Presence
        run: |
          echo "Checking for model files..."
          ls -R models/
          if [ ! -f "models/xgb_vpp_grid.json" ]; then
            echo "❌ CRITICAL: Model file missing in build context!"
            exit 1
          fi
          echo "✓ Model file found."

      - name: Deploy to Cloud Run (Production)
        id: deploy
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: vpp-mcp-server
          region: ${{ env.REGION }}
          source: .
          timeout: '300s'
          flags: --memory=1Gi --cpu=1 --cpu-boost --concurrency=10 --min-instances=1 --max-instances=20 --timeout=60s --startup-probe=httpGet.path=/health,httpGet.port=8080,initialDelaySeconds=15,periodSeconds=10,failureThreshold=3 --liveness-probe=httpGet.path=/health,httpGet.port=8080,periodSeconds=30,failureThreshold=3 --no-allow-unauthenticated
          secrets: |-
            INFLUX_CLOUD_URL=INFLUX_CLOUD_URL:latest
            INFLUX_CLOUD_TOKEN=INFLUX_CLOUD_TOKEN:latest
            INFLUX_CLOUD_ORG=INFLUX_CLOUD_ORG:latest
            INFLUX_CLOUD_BUCKET=INFLUX_CLOUD_BUCKET:latest
          env_vars: |-
            MCP_TRANSPORT=sse

      # Phase 3: Deploy BAM Service FIRST — actors depend on it being reachable
      - name: Deploy BAM Service (Production)
        id: deploy-bam-prod
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: bam-service-prod
          region: ${{ env.REGION }}
          source: .
          timeout: '300s'
          flags: >-
            --command=python
            --args=-m,vpp.agents.battery_manager
            --memory=512Mi
            --cpu=1
            --min-instances=1
            --max-instances=5
            --port=8000
            --startup-probe=httpGet.path=/state,httpGet.port=8000,initialDelaySeconds=10,periodSeconds=5,failureThreshold=5
            --no-allow-unauthenticated
          secrets: |-
            BAM_API_KEY=BAM_API_KEY:latest
            INFLUX_CLOUD_URL=INFLUX_CLOUD_URL:latest
            INFLUX_CLOUD_TOKEN=INFLUX_CLOUD_TOKEN:latest
            INFLUX_CLOUD_ORG=INFLUX_CLOUD_ORG:latest
            INFLUX_CLOUD_BUCKET=INFLUX_CLOUD_BUCKET:latest
          env_vars: |-
            BAM_CAPACITY_KWH=100000.0
            BAM_MAX_C_RATE=1.0
            BAM_WEAR_COST=0.015

      # Phase 5: Verify BAM is healthy before deploying actors that depend on it
      - name: BAM Service Health Check (Production)
        run: |
          BAM_URL="${{ steps.deploy-bam-prod.outputs.url }}"
          echo "Verifying BAM /state at $BAM_URL ..."
          TOKEN=$(gcloud auth print-identity-token)
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              "$BAM_URL/state")
            if [ "$STATUS" = "200" ]; then
              echo "✅ BAM Service healthy (HTTP 200) after $i attempt(s)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "❌ BAM Service failed health check after 10 attempts"
          exit 1

      - name: Deploy Consumer ML Job (Production)
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          job: consumer-ml-prod
          region: ${{ env.REGION }}
          source: .
          flags: --command=python --args=scripts/consumer_ml.py
          secrets: |-
            INFLUX_CLOUD_URL=INFLUX_CLOUD_URL:latest
            INFLUX_CLOUD_TOKEN=INFLUX_CLOUD_TOKEN:latest
            INFLUX_CLOUD_ORG=INFLUX_CLOUD_ORG:latest
            INFLUX_CLOUD_BUCKET=INFLUX_CLOUD_BUCKET:latest
            KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest

      - name: Deploy Arbitrage Trader Job (Production)
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          job: arbitrage-trader-prod
          region: ${{ env.REGION }}
          source: .
          flags: --command=python --args=-m,vpp.agents.arbitrage_trader
          secrets: |-
            INFLUX_CLOUD_URL=INFLUX_CLOUD_URL:latest
            INFLUX_CLOUD_TOKEN=INFLUX_CLOUD_TOKEN:latest
            INFLUX_CLOUD_ORG=INFLUX_CLOUD_ORG:latest
            INFLUX_CLOUD_BUCKET=INFLUX_CLOUD_BUCKET:latest
            BAM_API_KEY=BAM_API_KEY:latest
          env_vars: |-
            BAM_API_URL=${{ steps.deploy-bam-prod.outputs.url }}

      - name: Deploy Grid Response Actor Job (Production)
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          job: grid-response-prod
          region: ${{ env.REGION }}
          source: .
          flags: --command=python --args=-m,vpp.agents.grid_response_actor
          secrets: |-
            INFLUX_CLOUD_URL=INFLUX_CLOUD_URL:latest
            INFLUX_CLOUD_TOKEN=INFLUX_CLOUD_TOKEN:latest
            INFLUX_CLOUD_ORG=INFLUX_CLOUD_ORG:latest
            INFLUX_CLOUD_BUCKET=INFLUX_CLOUD_BUCKET:latest
            BAM_API_KEY=BAM_API_KEY:latest
          env_vars: |-
            BAM_API_URL=${{ steps.deploy-bam-prod.outputs.url }}

      - name: Production Deployment Complete
        run: |
          echo "Production deployment successful"
          echo "Service URL: https://vpp-mcp-server-${{ env.REGION }}.run.app"

      - name: Create Deployment Summary
        if: success()
        run: |
          echo "## Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ github.job }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Infrastructure Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Cloud Run Service Logs](https://console.cloud.google.com/run/detail/${{ env.REGION }}/vpp-mcp-server/logs?project=${{ env.GCP_PROJECT_ID }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Redpanda Connect VM](https://console.cloud.google.com/compute/instancesDetail/zones/${{ env.REDPANDA_VM_ZONE }}/instances/${{ env.REDPANDA_VM_NAME }}?project=${{ env.GCP_PROJECT_ID }})" >> $GITHUB_STEP_SUMMARY