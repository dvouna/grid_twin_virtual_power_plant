[tool.ruff]
# Target production directories
src = ["src", "scripts"]
line-length = 120

# Exclude research and infrastructure files from strict linting
exclude = [
    ".git",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "*.ipynb",
    "*_local.py",
    "check_alignment.py",
    "reproduce_bug.py",
    "diagnose_xgb.py",
    "mock_consumer.py",
    "inspect_model_deep.py",
    "compare_features_v2.py"
]

[tool.ruff.lint]
select = ["E", "F", "W", "B", "I"]
# Allow unused imports in __init__.py files.
# E501 (line-too-long): pre-existing, formatter enforces 120-char limit on new code.
# E402 (import not at top): pre-existing in scripts that require sys.path setup.
# F541 (f-string no placeholders): pre-existing in dashboard strings.
ignore = ["F401", "E501", "E402", "F541"]

[tool.ruff.lint.per-file-ignores]
"scripts/*" = ["F401"] # Allow research scripts to have unused imports sometimes
"src/vpp/__init__.py" = ["F401"]

[tool.bandit]
exclude_dirs = ["tests", ".venv", ".pytest_cache", ".ruff_cache"]
skips = ["B104"]
